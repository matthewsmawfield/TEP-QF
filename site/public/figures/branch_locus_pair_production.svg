<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#84a3aa"/>
    </marker>
    <pattern id="hatchPlus" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,8 L8,0 M-2,2 L2,-2 M6,10 L10,6" stroke="#1C2E4A" stroke-width="1" opacity="0.3"/>
    </pattern>
    <pattern id="hatchMinus" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,0 L8,8 M-2,6 L2,10 M6,-2 L10,2" stroke="#2C3E50" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="420" fill="#0a1628"/>

  <!-- Title -->
  <text x="300" y="24" font-family="Georgia, serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#84a3aa">
    Two-Sheeted Temporal Manifold: Pair-Production Branch Locus
  </text>

  <!-- M+ sheet region -->
  <rect x="50" y="45" width="240" height="355" fill="url(#hatchPlus)" stroke="#1C2E4A" stroke-width="1.5" rx="4"/>
  <text x="170" y="68" font-family="Georgia, serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#84a3aa">M<tspan dy="2" font-size="11">+</tspan></text>
  <text x="170" y="84" font-family="Georgia, serif" font-size="11" text-anchor="middle" fill="#5D6D7E">dτ̃ &gt; 0  (future-directed)</text>

  <!-- M- sheet region -->
  <rect x="310" y="45" width="240" height="355" fill="url(#hatchMinus)" stroke="#2C3E50" stroke-width="1.5" rx="4"/>
  <text x="430" y="68" font-family="Georgia, serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#84a3aa">M<tspan dy="2" font-size="11">−</tspan></text>
  <text x="430" y="84" font-family="Georgia, serif" font-size="11" text-anchor="middle" fill="#5D6D7E">dτ̃ &lt; 0  (reversed orientation)</text>

  <!-- Branch locus J -->
  <line x1="50" y1="220" x2="550" y2="220" stroke="#5D6D7E" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="560" y="224" font-family="Georgia, serif" font-size="13" fill="#5D6D7E">J<tspan font-size="10">br</tspan></text>
  <text x="300" y="238" font-family="Georgia, serif" font-size="11" text-anchor="middle" fill="#566573">branch locus (orientation bundle seam)</text>

  <!-- Coordinate axes for M+ -->
  <line x1="70" y1="380" x2="70" y2="100" stroke="#5D6D7E" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="62" y="95" font-family="Georgia, serif" font-size="12" fill="#5D6D7E">t</text>
  <line x1="70" y1="380" x2="260" y2="380" stroke="#5D6D7E" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="265" y="385" font-family="Georgia, serif" font-size="12" fill="#5D6D7E">x</text>

  <!-- Coordinate axes for M- -->
  <line x1="330" y1="380" x2="330" y2="100" stroke="#5D6D7E" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="322" y="95" font-family="Georgia, serif" font-size="12" fill="#5D6D7E">t</text>
  <line x1="330" y1="380" x2="520" y2="380" stroke="#5D6D7E" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="525" y="385" font-family="Georgia, serif" font-size="12" fill="#5D6D7E">x</text>

  <!-- Photon approaching on M+ (null line) -->
  <line x1="170" y1="380" x2="170" y2="220" stroke="#D4E6F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="170,215 166,225 174,225" fill="#D4E6F1"/>
  <text x="140" y="300" font-family="Georgia, serif" font-size="11" fill="#D4E6F1">γ (null)</text>

  <!-- Vertex V -->
  <circle cx="170" cy="220" r="4" fill="#84a3aa"/>
  <text x="158" y="212" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#84a3aa">V</text>

  <!-- Electron e- on M+ (timelike) -->
  <path d="M170,220 Q190,180 210,140 Q230,110 250,100" stroke="#1C2E4A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="255" y="105" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#1C2E4A">e<tspan dy="2" font-size="10">−</tspan></text>
  <text x="245" y="125" font-family="Georgia, serif" font-size="10" fill="#5D6D7E">timelike, |dx/dt|&lt;c</text>

  <!-- Photon approaching on M- (null line) -->
  <line x1="430" y1="380" x2="430" y2="220" stroke="#D4E6F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="430,215 426,225 434,225" fill="#D4E6F1"/>
  <text x="400" y="300" font-family="Georgia, serif" font-size="11" fill="#D4E6F1">γ (null)</text>

  <!-- Vertex V on M- -->
  <circle cx="430" cy="220" r="4" fill="#84a3aa"/>
  <text x="418" y="212" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#84a3aa">V</text>

  <!-- Positron e+ on M- (timelike, reversed orientation) -->
  <path d="M430,220 Q410,180 390,140 Q370,110 350,100" stroke="#2C3E50" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="320" y="105" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#2C3E50">e<tspan dy="2" font-size="10">+</tspan></text>
  <text x="340" y="125" font-family="Georgia, serif" font-size="10" fill="#5D6D7E">timelike, reversed τ̃</text>

  <!-- Annotation: both advance in t -->
  <text x="300" y="400" font-family="Georgia, serif" font-size="11" text-anchor="middle" fill="#566573">
    Both branches advance forward in coordinate time t; sheet distinction is geometric, not causal reversal.
  </text>
</svg>
