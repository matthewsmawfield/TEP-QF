# Quick test for hi_class with native TEP and narrow priors
theory:
  classy:
    path: /Users/matthewsmawfield/www/Temporal Equivalence Principle/TEP-HC/external/hi_class/hi_class
    ignore_obsolete: True
    extra_args:
      output: tCl,pCl,lCl
      lensing: yes
      modes: s,t
      expansion_model: lcdm
      tep_mode: 'yes'
      epsilon_T: 0.0066
      z_T: 5.0
      n_T: 2.0

likelihood:
  planck_2018_highl_plik.TTTEEE: null
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null

params:
  logA:
    prior: {min: 2.9, max: 3.2}
    ref: {dist: norm, loc: 3.044, scale: 0.014}
    proposal: 0.01
    drop: true
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
  n_s:
    prior: {min: 0.94, max: 1.0}
    ref: {dist: norm, loc: 0.966, scale: 0.004}
    proposal: 0.002
  H0:
    prior: {min: 65, max: 70}
    ref: {dist: norm, loc: 67.4, scale: 0.5}
    proposal: 0.5
  omega_b:
    prior: {min: 0.021, max: 0.024}
    ref: {dist: norm, loc: 0.0224, scale: 0.0002}
    proposal: 0.0001
  omega_cdm:
    prior: {min: 0.10, max: 0.14}
    ref: {dist: norm, loc: 0.12, scale: 0.001}
    proposal: 0.0005
  tau_reio:
    prior: {min: 0.04, max: 0.07}
    ref: {dist: norm, loc: 0.054, scale: 0.007}
    proposal: 0.003
  epsilon_T:
    prior: {min: 0.0, max: 0.02}
    ref: {dist: norm, loc: 0.0066, scale: 0.002}
    proposal: 0.001
    latex: \epsilon_T

sampler:
  mcmc:
    max_samples: 100
    Rminus1_stop: 0.5
    output_every: 10
    learn_proposal: False

output: results/mcmc_chains/tep_hiclass_narrow_quick
